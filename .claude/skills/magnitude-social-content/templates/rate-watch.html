<!--
Rate Watch card. Lender rate news for WhatsApp / LinkedIn.
Size: 1080 x 1080 (square).

Tokens (replaced at render time via render.py --var NAME=VALUE):
  {{LENDER_NAME}}       lender name, uppercase tag e.g. "Northridge"
  {{HEADLINE}}          main headline e.g. "Rates just dropped."
  {{RATE_FROM_LABEL}}   small label above rate e.g. "From"
  {{RATE_VALUE}}        numeric rate e.g. "7.9"
  {{RATE_SUFFIX}}       unit e.g. "% APR"
  {{BODY_TEXT}}         2-3 sentence body copy
  {{DISCLAIMER}}        legal disclaimer line

To preview locally (opens in browser, no hcti.io credits used):
  python3 .claude/skills/magnitude-social-content/templates/render.py rate-watch \
    --width 1080 --height 1080 \
    --local \
    --var LENDER_NAME="Northridge" \
    --var HEADLINE="Rates just dropped." \
    --var RATE_FROM_LABEL="From" \
    --var RATE_VALUE="7.9" \
    --var RATE_SUFFIX="% APR" \
    --var BODY_TEXT="Northridge have cut their minimum rate on HP and PCP. Effective immediately. Worth knowing before your next proposal." \
    --var DISCLAIMER="7.9% APR Representative. We are a credit broker, not a lender. Magnitude Finance is a trading style of DSG Financial Services Ltd. DSG Financial Services Ltd is authorised and regulated by the Financial Conduct Authority. FRN: 649675"

To render to PNG via hcti.io (drop --local):
  python3 .claude/skills/magnitude-social-content/templates/render.py rate-watch \
    --width 1080 --height 1080 \
    --var LENDER_NAME="Northridge" \
    --var HEADLINE="Rates just dropped." \
    --var RATE_FROM_LABEL="From" \
    --var RATE_VALUE="7.9" \
    --var RATE_SUFFIX="% APR" \
    --var BODY_TEXT="Northridge have cut their minimum rate on HP and PCP. Effective immediately. Worth knowing before your next proposal." \
    --var DISCLAIMER="7.9% APR Representative. We are a credit broker, not a lender. Magnitude Finance is a trading style of DSG Financial Services Ltd. DSG Financial Services Ltd is authorised and regulated by the Financial Conduct Authority. FRN: 649675"

Rules:
  1. Never use em or en dashes. render.py will refuse to render if any slip in.
  2. BODY_TEXT should be 2-3 short sentences, no more than ~25 words total.
  3. Keep HEADLINE punchy, under 6 words.
-->
<div style="width:1080px;height:1080px;background:#1A212E;position:relative;overflow:hidden;font-family:Poppins,sans-serif;box-sizing:border-box;">

  <!-- top orange accent bar -->
  <div style="position:absolute;top:0;left:0;right:0;height:8px;background:#ED792B;"></div>

  <!-- inner content column -->
  <div style="position:absolute;top:0;left:0;right:0;bottom:0;padding:56px 64px 48px;display:flex;flex-direction:column;box-sizing:border-box;">

    <!-- logo -->
    <div style="margin-bottom:40px;">
      <img src="../../../../references/brand/logos/magnitude-full-brand.png" style="height:44px;display:block;" />
    </div>

    <!-- lender tag -->
    <div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:20px;">
      <div style="width:10px;height:10px;background:#ED792B;border-radius:50%;flex-shrink:0;"></div>
      <span style="font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:#ED792B;letter-spacing:3px;text-transform:uppercase;">{{LENDER_NAME}}</span>
    </div>

    <!-- headline -->
    <div style="font-family:Poppins,sans-serif;font-size:60px;font-weight:900;color:#FFFFFF;line-height:1.05;letter-spacing:-1px;margin-bottom:32px;flex:1;">
      {{HEADLINE}}
    </div>

    <!-- rate callout -->
    <div style="margin-bottom:28px;">
      <div style="font-family:Montserrat,sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">{{RATE_FROM_LABEL}}</div>
      <div style="display:flex;align-items:baseline;gap:8px;">
        <span style="font-family:Poppins,sans-serif;font-size:96px;font-weight:900;color:#ED792B;line-height:1;letter-spacing:-3px;">{{RATE_VALUE}}</span>
        <span style="font-family:Poppins,sans-serif;font-size:40px;font-weight:700;color:#ED792B;letter-spacing:-0.5px;">{{RATE_SUFFIX}}</span>
      </div>
    </div>

    <!-- body text -->
    <p style="font-family:Montserrat,sans-serif;font-size:18px;font-weight:400;color:rgba(255,255,255,0.75);line-height:1.65;margin-bottom:28px;">
      {{BODY_TEXT}}
    </p>

    <!-- divider -->
    <div style="height:1px;background:rgba(255,255,255,0.1);margin-bottom:20px;"></div>

    <!-- disclaimer -->
    <p style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:400;color:rgba(255,255,255,0.35);line-height:1.5;">
      {{DISCLAIMER}}
    </p>

  </div>

</div>
